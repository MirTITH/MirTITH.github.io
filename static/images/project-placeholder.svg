  </g>
  <text x="640" y="485" text-anchor="middle" fill="#334155" font-family="system-ui, sans-serif" font-size="38" font-weight="600">PROJECT PREVIEW</text>
  <text x="640" y="535" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="24">图片待补充</text>
