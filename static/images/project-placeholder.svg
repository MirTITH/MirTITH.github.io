  </defs>
  <rect width="1280" height="720" fill="url(#background)"/>
  <circle cx="1100" cy="80" r="260" fill="#ffffff" opacity="0.3"/>
  <circle cx="120" cy="680" r="300" fill="#ffffff" opacity="0.35"/>
  <g transform="translate(520 190)">
